spring.application.name=project-bridge
project.base-dir=/app/projects

# MCP Server Configuration
spring.ai.mcp.server.name=project-bridge
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp

# Logging Configuration
logging.level.root=INFO
logging.level.com.github.advoc_diaboly.design_artifacts_mcp_server=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.http=INFO
logging.level.org.springframework.ai.mcp=INFO
logging.level.org.apache.catalina=INFO




